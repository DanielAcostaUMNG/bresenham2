<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Algoritmo de Bresenham</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    main {
      max-width: 900px;
      margin: auto;
    }
    fieldset {
      margin-bottom: 16px;
      padding: 16px;
    }
    label {
      display: inline-block;
      width: 40px;
      margin-right: 8px;
    }
    input {
      width: 70px;
      margin-right: 12px;
    }
    button {
      margin-right: 10px;
      padding: 6px 12px;
    }
    canvas {
      display: block;
      border: 1px solid #000;
      margin-top: 16px;
      background: #f8f8f8;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }
    th, td {
      border: 1px solid #888;
      padding: 6px;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <!-- Título principal de la aplicación -->
    <h1>Algoritmo de Bresenham</h1>

    <!-- Sección de entrada de coordenadas -->
    <fieldset>
      <legend>Coordenadas de la línea</legend>
      <label for="x0">x0:</label><input id="x0" type="number" value="50" />
      <label for="y0">y0:</label><input id="y0" type="number" value="50" />
      <label for="x1">x1:</label><input id="x1" type="number" value="300" />
      <label for="y1">y1:</label><input id="y1" type="number" value="200" />
      <button id="drawButton" type="button">Dibujar línea</button>
      <button id="clearButton" type="button">Limpiar</button>
    </fieldset>

    <!-- Área de dibujo del canvas -->
    <canvas id="canvas" width="800" height="500"></canvas>

    <!-- Tabla de pasos del algoritmo -->
    <h2>Tabla de pasos</h2>
    <table>
      <thead>
        <tr>
          <th>Paso</th>
          <th>x</th>
          <th>y</th>
          <th>err</th>
          <th>e2</th>
        </tr>
      </thead>
      <tbody id="stepsTable"></tbody>
    </table>
  </main>

  <!-- Script de JavaScript -->
  <script src="script.js" defer></script>
</body>
</html>
